<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus List - 智能待办清单</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于在浏览器中解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 模拟 Lucide 图标组件 (由于单文件环境限制，我们手动映射图标)
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const CATEGORIES = [
            { id: '工作', icon: 'briefcase', color: 'text-blue-500', bg: 'bg-blue-50' },
            { id: '生活', icon: 'coffee', color: 'text-green-500', bg: 'bg-green-50' },
            { id: '学习', icon: 'user', color: 'text-purple-500', bg: 'bg-purple-50' },
        ];

        const PRIORITIES = [
            { id: '高', color: 'text-red-600', bg: 'bg-red-100', dot: 'bg-red-500' },
            { id: '中', color: 'text-orange-600', bg: 'bg-orange-100', dot: 'bg-orange-500' },
            { id: '低', color: 'text-gray-600', bg: 'bg-gray-100', dot: 'bg-gray-400' },
        ];

        function App() {
            // 从 LocalStorage 加载数据
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('smart_todo_tasks');
                return saved ? JSON.parse(saved) : [
                    { id: 1, text: '欢迎使用 Focus List！', category: '生活', priority: '低', completed: false }
                ];
            });

            const [activeView, setActiveView] = useState('全部');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [newTaskText, setNewTaskText] = useState('');
            const [newTaskCategory, setNewTaskCategory] = useState('工作');
            const [newTaskPriority, setNewTaskPriority] = useState('中');

            // 持久化保存
            useEffect(() => {
                localStorage.setItem('smart_todo_tasks', JSON.stringify(tasks));
                if (window.lucide) window.lucide.createIcons();
            }, [tasks]);

            const filteredTasks = useMemo(() => {
                let result = [...tasks];
                if (activeView === '高优先级') result = result.filter(t => t.priority === '高' && !t.completed);
                else if (activeView === '已完成') result = result.filter(t => t.completed);
                else if (activeView !== '全部') result = result.filter(t => t.category === activeView);

                return result.sort((a, b) => {
                    if (a.completed !== b.completed) return a.completed ? 1 : -1;
                    const weight = { '高': 3, '中': 2, '低': 1 };
                    return weight[b.priority] - weight[a.priority];
                });
            }, [tasks, activeView]);

            const addTask = (e) => {
                e.preventDefault();
                if (!newTaskText.trim()) return;
                const newTask = {
                    id: Date.now(),
                    text: newTaskText.trim(),
                    category: newTaskCategory,
                    priority: newTaskPriority,
                    completed: false
                };
                setTasks([newTask, ...tasks]);
                setNewTaskText('');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            return (
                <div className="flex h-screen bg-gray-50 text-gray-800 overflow-hidden">
                    {/* Sidebar Mobile Overlay */}
                    {isSidebarOpen && (
                        <div className="fixed inset-0 bg-black/20 z-20 md:hidden" onClick={() => setIsSidebarOpen(false)} />
                    )}

                    {/* Sidebar */}
                    <aside className={`fixed md:static inset-y-0 left-0 z-30 w-64 bg-white border-r border-gray-100 flex flex-col transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-6 flex items-center justify-between">
                            <h1 className="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent italic">Focus List</h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-6">
                            <div>
                                <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3 px-2">智能视图</h2>
                                <div className="space-y-1">
                                    {['全部', '高优先级', '已完成'].map(view => (
                                        <button key={view} onClick={() => setActiveView(view)} className={`w-full flex items-center px-3 py-2 rounded-xl transition-all ${activeView === view ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-600 hover:bg-gray-50'}`}>
                                            <Icon name={view === '全部' ? 'list' : view === '高优先级' ? 'alert-circle' : 'check-circle-2'} className="mr-3" />
                                            {view}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3 px-2">清单分类</h2>
                                <div className="space-y-1">
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => setActiveView(cat.id)} className={`w-full flex items-center px-3 py-2 rounded-xl transition-all ${activeView === cat.id ? `${cat.bg} ${cat.color} font-medium` : 'text-gray-600 hover:bg-gray-50'}`}>
                                            <Icon name={cat.icon} className="mr-3" />
                                            {cat.id}
                                            <span className="ml-auto text-xs opacity-60">{tasks.filter(t => t.category === cat.id && !t.completed).length}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden">
                        <header className="md:hidden flex items-center p-4 bg-white border-b border-gray-100">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-1"><Icon name="menu" size={24} /></button>
                            <h2 className="ml-4 font-bold">{activeView}</h2>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-12 no-scrollbar">
                            <div className="max-w-3xl mx-auto">
                                <div className="hidden md:block mb-10">
                                    <h2 className="text-4xl font-extrabold text-gray-900 tracking-tight">{activeView}</h2>
                                    <p className="text-gray-500 mt-2 text-lg">今天有 {tasks.filter(t => !t.completed).length} 件事项需要处理</p>
                                </div>

                                {activeView !== '已完成' && (
                                    <form onSubmit={addTask} className="mb-8 bg-white p-2 pl-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-center gap-3">
                                        <input 
                                            type="text" 
                                            value={newTaskText}
                                            onChange={(e) => setNewTaskText(e.target.value)}
                                            placeholder="接下来要做什么？" 
                                            className="flex-1 bg-transparent border-none outline-none py-3 text-lg" 
                                        />
                                        <div className="flex items-center gap-2 w-full sm:w-auto">
                                            <select value={newTaskPriority} onChange={e => setNewTaskPriority(e.target.value)} className="bg-gray-50 rounded-lg px-2 py-2 text-sm outline-none">
                                                <option value="高">🔴 高</option>
                                                <option value="中">🟡 中</option>
                                                <option value="低">⚪ 低</option>
                                            </select>
                                            <select value={newTaskCategory} onChange={e => setNewTaskCategory(e.target.value)} className="bg-gray-50 rounded-lg px-2 py-2 text-sm outline-none">
                                                {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.id}</option>)}
                                            </select>
                                            <button type="submit" className="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-colors">
                                                <Icon name="plus" />
                                            </button>
                                        </div>
                                    </form>
                                )}

                                <div className="space-y-3">
                                    {filteredTasks.length === 0 ? (
                                        <div className="text-center py-20 text-gray-400">
                                            <Icon name="coffee" size={48} className="mx-auto mb-4 opacity-20" />
                                            <p>这里很安静，什么都没有...</p>
                                        </div>
                                    ) : (
                                        filteredTasks.map(task => {
                                            const cat = CATEGORIES.find(c => c.id === task.category) || CATEGORIES[0];
                                            const pri = PRIORITIES.find(p => p.id === task.priority) || PRIORITIES[1];
                                            return (
                                                <div key={task.id} className={`group flex items-center p-4 bg-white rounded-2xl border transition-all ${task.completed ? 'opacity-50 grayscale' : 'hover:shadow-md hover:border-blue-100'}`}>
                                                    <button onClick={() => toggleTask(task.id)} className={`mr-4 transition-colors ${task.completed ? 'text-blue-500' : 'text-gray-300'}`}>
                                                        <Icon name={task.completed ? 'check-circle-2' : 'circle'} size={24} />
                                                    </button>
                                                    <div className="flex-1">
                                                        <p className={`text-lg ${task.completed ? 'line-through text-gray-400' : 'text-gray-800'}`}>{task.text}</p>
                                                        <div className="flex gap-3 mt-1 text-[10px] font-bold uppercase tracking-wider">
                                                            <span className={`${cat.color}`}>{task.category}</span>
                                                            {!task.completed && <span className="text-gray-400 flex items-center">
                                                                <span className={`w-1.5 h-1.5 rounded-full mr-1.5 ${pri.dot}`}></span>
                                                                {task.priority}优先级
                                                            </span>}
                                                        </div>
                                                    </div>
                                                    <button onClick={() => deleteTask(task.id)} className="opacity-0 group-hover:opacity-100 p-2 text-gray-300 hover:text-red-500 transition-all">
                                                        <Icon name="trash-2" size={18} />
                                                    </button>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
